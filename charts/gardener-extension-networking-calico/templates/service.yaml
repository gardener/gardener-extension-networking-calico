apiVersion: v1
kind: Service
metadata:
  name: {{ include "name" . }}
  namespace: {{ .Release.Namespace }}
  annotations:
    networking.resources.gardener.cloud/from-all-seed-scrape-targets-allowed-ports: '[{"port":{{ tpl .Values.metricsPort . }},"protocol":"TCP"}]'
    networking.resources.gardener.cloud/namespace-selectors: '[{"matchLabels":{"kubernetes.io/metadata.name":"garden"}}]'
    networking.resources.gardener.cloud/pod-label-selector-namespace-alias: extensions
    {{- if .Values.ignoreResources }}
    resources.gardener.cloud/ignore: "true"
    {{- end }}
  labels:
{{ include "labels" . | indent 4 }}
spec:
  type: ClusterIP
  selector:
{{ include "labels" . | indent 4 }}
  ports:
  - port: {{ tpl .Values.metricsPort . }}
    protocol: TCP
    targetPort: {{ tpl .Values.metricsPort . }}
  {{- if and (include "topologyAwareRouting.enabled" .) (semverCompare "< 1.34-0" .Capabilities.KubeVersion.Version) }}
  trafficDistribution: PreferClose
  {{- end }}
  {{- if and (include "topologyAwareRouting.enabled" .) (semverCompare ">= 1.34-0" .Capabilities.KubeVersion.Version) }}
  trafficDistribution: PreferSameZone
  {{- end }}
